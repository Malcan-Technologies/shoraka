<!DOCTYPE html>
<html>
<head>
<title>CashSouk - Financial Information</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f6f7f9;
}

.container{
  display:flex;
}

.sidebar{
  width:230px;
  background:white;
  height:100vh;
  border-right:1px solid #eee;
  padding:20px;
}

.main{
  flex:1;
  padding:30px;
}

.step-bar{
  display:flex;
  gap:20px;
  margin-bottom:30px;
  font-size:14px;
}

.step{
  color:#999;
}

.step.active{
  font-weight:bold;
  color:black;
}

.card{
  background:white;
  padding:25px;
  border-radius:8px;
  border:1px solid #eee;
  margin-bottom:20px;
}

.section-title{
  font-weight:bold;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

input{
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:6px;
}

label{
  font-size:13px;
  color:#555;
}

.actions{
  display:flex;
  justify-content:space-between;
  margin-top:30px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.back{
  background:#e5e7eb;
}

.next{
  background:#b91c1c;
  color:white;
}
</style>

</head>

<body>

<div class="container">

<div class="sidebar">
<h3>CashSouk</h3>
<br>
Dashboard<br><br>
Profile<br><br>
Applications<br><br>
Loan<br><br>
Transactions<br><br>
Activity
</div>


<div class="main">

<h2>Provide Financial Information</h2>

<div class="step-bar">
<span class="step">Financing Type</span>
<span class="step">Financing Structure</span>
<span class="step">Contract</span>
<span class="step">Invoice</span>
<span class="step">Company</span>
<span class="step">Business</span>
<span class="step active">Financial</span>
<span class="step">Supporting</span>
<span class="step">Declaration</span>
<span class="step">Review</span>
</div>


<div class="card">

<div class="section-title">Financial Year</div>

<div class="grid">

<div>
<label>Financial Year</label>
<input type="number" placeholder="2024">
</div>

<div>
<label>Financial Year End Date</label>
<input type="date">
</div>

</div>

</div>


<div class="card">

<div class="section-title">Balance Sheet</div>

<div class="grid">

<div>
<label>Fixed Assets</label>
<input placeholder="Enter amount">
</div>

<div>
<label>Other Assets</label>
<input placeholder="Enter amount">
</div>

<div>
<label>Current Assets</label>
<input placeholder="Enter amount">
</div>

<div>
<label>Bank Balance</label>
<input placeholder="Enter amount">
</div>

<div>
<label>Total Assets</label>
<input placeholder="Auto calculated" disabled>
</div>

</div>

</div>



<div class="card">

<div class="section-title">Liabilities</div>

<div class="grid">

<div>
<label>Current Liabilities</label>
<input placeholder="Enter amount">
</div>

<div>
<label>Long Term Liabilities</label>
<input placeholder="Enter amount">
</div>

<div>
<label>Total Liabilities</label>
<input placeholder="Auto calculated" disabled>
</div>

<div>
<label>Shareholder Equity</label>
<input placeholder="Enter amount">
</div>

</div>

</div>


<div class="card">

<div class="section-title">Profit & Loss</div>

<div class="grid">

<div>
<label>Turnover</label>
<input placeholder="Enter amount">
</div>

<div>
<label>Profit Before Tax</label>
<input placeholder="Enter amount">
</div>

<div>
<label>Profit After Tax</label>
<input placeholder="Enter amount">
</div>

<div>
<label>Net Dividend</label>
<input placeholder="Enter amount">
</div>

<div>
<label>Profit For The Year</label>
<input placeholder="Enter amount">
</div>

</div>

</div>


<div class="actions">

<button class="back">Back</button>

<button class="next">Save and continue →</button>

</div>

</div>

</div>

</body>
</html>
