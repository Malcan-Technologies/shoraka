<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>WiseAI eKYC capture</title>
    <link rel="stylesheet" href="/wailib/css/wailib-min-1.12.0.css" />
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: #f8fafc;
        color: #0f172a;
      }

      main {
        max-width: 48rem;
        margin: 0 auto;
        padding: 1rem 1rem 2rem;
      }

      h1 {
        margin: 0 0 0.25rem;
        font-size: 1.25rem;
        line-height: 1.4;
      }

      p {
        margin: 0;
      }

      .muted {
        color: #64748b;
        font-size: 0.95rem;
        line-height: 1.6;
      }

      .status {
        margin-top: 0.875rem;
        padding: 0.875rem 1rem;
        border-radius: 0.75rem;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        font-size: 0.95rem;
      }

      .status.error {
        color: #b91c1c;
        border-color: #fecaca;
        background: #fef2f2;
      }

      .status.success {
        color: #166534;
        border-color: #86efac;
        background: #f0fdf4;
      }

      #ekyc-container {
        min-height: 70vh;
        margin-top: 1rem;
      }

      pre {
        margin-top: 1rem;
        padding: 0.875rem;
        border-radius: 0.75rem;
        background: #0f172a;
        color: #e2e8f0;
        font-size: 0.75rem;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
        overflow: auto;
      }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/wailib/js/webrtc-adapter.js"></script>
    <script src="/wailib/js/wailib-util-min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxjs/dist/onnx.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.webgpu.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="/wailib/js/wailib-sdk-1.12.2.js"></script>
  </head>
  <body>
    <main>
      <h1>Complete eKYC on this device</h1>
      <p class="muted">
        Follow the WiseAI prompts to capture the document and selfie. When this page says it is
        done, you can close it and return to the desktop browser.
      </p>

      <div id="status" class="status">Starting capture flow...</div>
      <div id="ekyc-container"></div>
      <pre id="result" hidden></pre>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const endpoint = params.get("endpoint");
      const docType = params.get("docType") || "mykad";
      const apiBase = (params.get("api") || "").replace(/\/$/, "");
      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");
      const containerId = "ekyc-container";

      function setStatus(text, kind) {
        statusEl.textContent = text;
        statusEl.className = "status" + (kind ? " " + kind : "");
      }

      function showResult(value) {
        resultEl.hidden = false;
        resultEl.textContent =
          typeof value === "string" ? value : JSON.stringify(value, null, 2);
      }

      async function submitCompletion(rawResult) {
        const response = await fetch(apiBase + "/v1/prototype/ekyc/complete", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, result: rawResult }),
        });
        const body = await response.json();
        if (!response.ok) {
          const message =
            body && body.error && typeof body.error.message === "string"
              ? body.error.message
              : "Submit failed";
          throw new Error(message);
        }
        return body;
      }

      async function run() {
        if (!token || !endpoint || !apiBase) {
          setStatus("Missing token, endpoint, or api in the QR link.", "error");
          return;
        }

        if (typeof WAILib === "undefined" || !WAILib.SDK) {
          setStatus("WiseAI SDK failed to load.", "error");
          return;
        }

        const sdk = new WAILib.SDK(
          token,
          endpoint,
          containerId,
          {
            docType,
            showActionButtons: true,
            cameraFit: true,
            enableIDFraudDetection: true,
          },
          "/wailib/models"
        );

        sdk.startCamera();
        setStatus("Camera is ready. Follow the on-screen WiseAI instructions.");

        sdk.cameraCapture({
          onSuccess: async function (_stage, rawResult) {
            setStatus("Submitting your eKYC result...");
            try {
              const body = await submitCompletion(rawResult);
              document.getElementById(containerId).innerHTML =
                '<div class="status success"><strong>Done.</strong> You can close this page and continue on your computer.</div>';
              setStatus("eKYC capture submitted successfully.", "success");
              showResult(body);
            } catch (error) {
              const message = error instanceof Error ? error.message : String(error);
              setStatus(message, "error");
              showResult({ rawResult });
            }
          },
          onError: function (stage, error) {
            setStatus("WiseAI error at stage " + stage + ": " + error, "error");
          },
        });
      }

      run();
    </script>
  </body>
</html>
