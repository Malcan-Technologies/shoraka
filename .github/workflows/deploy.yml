              --build-arg "NEXT_PUBLIC_ADMIN_URL=https://admin.cashsouk.com" \
              --build-arg "NEXT_PUBLIC_LANDING_URL=https://cashsouk.com" \
              --build-arg "NEXT_PUBLIC_COOKIE_DOMAIN=.cashsouk.com" \
              -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .; then
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Build failed after $max_attempts attempts"
              exit 1
            fi

            attempt=$((attempt + 1))
            sleep 60
          done

          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

  db-migrations:
    name: Database Migrations
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs['detect-changes'].outputs.migrations == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push migration image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: cashsouk-migrate
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          docker build -f docker/migrate.Dockerfile -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Run database migrations
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          aws logs create-log-group --log-group-name /ecs/cashsouk-migrate --region "$AWS_REGION" 2>/dev/null || true

          TASK_DEF="$(jq --arg IMAGE "$ECR_REGISTRY/cashsouk-migrate:$IMAGE_TAG" '.containerDefinitions[0].image = $IMAGE' infra/ecs-task-definition-migrate.json)"

          TASK_DEF_ARN="$(aws ecs register-task-definition \
            --cli-input-json "$TASK_DEF" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          SUBNETS="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$API_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.subnets' \
            --output text | tr '\t' ',')"

          SECURITY_GROUPS="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$API_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups' \
            --output text | tr '\t' ',')"

          ASSIGN_PUBLIC_IP="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$API_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.assignPublicIp' \
            --output text)"

          if [ -z "$ASSIGN_PUBLIC_IP" ] || [ "$ASSIGN_PUBLIC_IP" = "None" ]; then
            ASSIGN_PUBLIC_IP="DISABLED"
          fi

          RUN_TASK_JSON="$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --launch-type FARGATE \
            --task-definition "$TASK_DEF_ARN" \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SECURITY_GROUPS],assignPublicIp=$ASSIGN_PUBLIC_IP}" \
            --region "$AWS_REGION" \
            --output json)"

          FAILURE_REASON="$(echo "$RUN_TASK_JSON" | jq -r '.failures[0].reason // empty')"
          TASK_ARN="$(echo "$RUN_TASK_JSON" | jq -r '.tasks[0].taskArn // empty')"

          if [ -n "$FAILURE_REASON" ] || [ -z "$TASK_ARN" ]; then
            echo "Failed to start migration task"
            echo "$RUN_TASK_JSON"
            exit 1
          fi

          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" --region "$AWS_REGION"

          EXIT_CODE="$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --region "$AWS_REGION" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migrations failed with exit code $EXIT_CODE"
            aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" --region "$AWS_REGION" --query 'tasks[0]' || true
            aws logs tail /ecs/cashsouk-migrate --since 15m --format short --region "$AWS_REGION" || true
            exit 1
          fi

          echo "Migrations completed successfully"

  deploy-api:
    name: Deploy API
    needs: [detect-changes, build-api, db-migrations]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs['detect-changes'].outputs.api == 'true' &&
      needs['build-api'].result == 'success' &&
      (needs['db-migrations'].result == 'success' || needs['db-migrations'].result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Register task definition and deploy API
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          IMAGE="$ECR_REGISTRY/api-cashsouk:$IMAGE_TAG"
          aws logs create-log-group --log-group-name /ecs/cashsouk-api --region "$AWS_REGION" 2>/dev/null || true

          TASK_DEF="$(jq --arg IMAGE "$IMAGE" --arg FAMILY "default-api-cashsouk-09ff" '.family = $FAMILY | .containerDefinitions[0].image = $IMAGE' infra/ecs-task-definition-api.json)"
          TASK_DEF_ARN="$(aws ecs register-task-definition --cli-input-json "$TASK_DEF" --region "$AWS_REGION" --query 'taskDefinition.taskDefinitionArn' --output text)"

          aws ecs update-service --cluster "$ECS_CLUSTER" --service api-cashsouk-09ff --task-definition "$TASK_DEF_ARN" --force-new-deployment --region "$AWS_REGION" > /dev/null
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services api-cashsouk-09ff --region "$AWS_REGION"

          SERVICE_JSON="$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services api-cashsouk-09ff --region "$AWS_REGION" --output json)"
          RUNNING_TASK_DEF="$(echo "$SERVICE_JSON" | jq -r '.services[0].deployments[] | select(.status == "PRIMARY") | .taskDefinition')"
          ROLLOUT_STATE="$(echo "$SERVICE_JSON" | jq -r '.services[0].deployments[] | select(.status == "PRIMARY") | .rolloutState // "UNKNOWN"')"
          RUNNING_COUNT="$(echo "$SERVICE_JSON" | jq -r '.services[0].runningCount')"
          DESIRED_COUNT="$(echo "$SERVICE_JSON" | jq -r '.services[0].desiredCount')"

          if [ "$RUNNING_TASK_DEF" != "$TASK_DEF_ARN" ] || [ "$ROLLOUT_STATE" = "FAILED" ] || [ "$RUNNING_COUNT" -lt "$DESIRED_COUNT" ]; then
            echo "API deployment verification failed"
            echo "Expected task definition: $TASK_DEF_ARN"
            echo "Running task definition:  $RUNNING_TASK_DEF"
            echo "Rollout: $ROLLOUT_STATE | Running: $RUNNING_COUNT | Desired: $DESIRED_COUNT"
            exit 1
          fi

