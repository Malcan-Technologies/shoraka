  summary:
    name: Deployment Summary
    needs:
      - detect-changes
      - build-api
      - build-landing
      - build-investor
      - build-issuer
      - build-admin
      - db-migrations
      - deploy-api
      - deploy-landing
      - deploy-investor
      - deploy-issuer
      - deploy-admin
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment summary
        env:
          DETECT_RESULT: ${{ needs['detect-changes'].result }}
          ACTION: ${{ needs['detect-changes'].outputs.action }}
          API: ${{ needs['detect-changes'].outputs.api }}
          LANDING: ${{ needs['detect-changes'].outputs.landing }}
          INVESTOR: ${{ needs['detect-changes'].outputs.investor }}
          ISSUER: ${{ needs['detect-changes'].outputs.issuer }}
          ADMIN: ${{ needs['detect-changes'].outputs.admin }}
          MIGRATIONS: ${{ needs['detect-changes'].outputs.migrations }}
          BUILD_API_RESULT: ${{ needs['build-api'].result }}
          BUILD_LANDING_RESULT: ${{ needs['build-landing'].result }}
          BUILD_INVESTOR_RESULT: ${{ needs['build-investor'].result }}
          BUILD_ISSUER_RESULT: ${{ needs['build-issuer'].result }}
          BUILD_ADMIN_RESULT: ${{ needs['build-admin'].result }}
          MIGRATION_RESULT: ${{ needs['db-migrations'].result }}
          DEPLOY_API_RESULT: ${{ needs['deploy-api'].result }}
          DEPLOY_LANDING_RESULT: ${{ needs['deploy-landing'].result }}
          DEPLOY_INVESTOR_RESULT: ${{ needs['deploy-investor'].result }}
          DEPLOY_ISSUER_RESULT: ${{ needs['deploy-issuer'].result }}
          DEPLOY_ADMIN_RESULT: ${{ needs['deploy-admin'].result }}
        run: |
          set -euo pipefail

          echo "Deployment summary"
          echo "Image tag: ${{ github.sha }}"
          echo "Action: ${ACTION:-n/a}"
          echo ""
          echo "Service    | Selected | Build              | Deploy"
          echo "-----------|----------|--------------------|----------------"
          echo "API        | ${API:-false} | $BUILD_API_RESULT | $DEPLOY_API_RESULT"
          echo "Landing    | ${LANDING:-false} | $BUILD_LANDING_RESULT | $DEPLOY_LANDING_RESULT"
          echo "Investor   | ${INVESTOR:-false} | $BUILD_INVESTOR_RESULT | $DEPLOY_INVESTOR_RESULT"
          echo "Issuer     | ${ISSUER:-false} | $BUILD_ISSUER_RESULT | $DEPLOY_ISSUER_RESULT"
          echo "Admin      | ${ADMIN:-false} | $BUILD_ADMIN_RESULT | $DEPLOY_ADMIN_RESULT"
          echo "Migrations | ${MIGRATIONS:-false} | n/a | $MIGRATION_RESULT"

          for result in \
            "$DETECT_RESULT" \
            "$BUILD_API_RESULT" \
            "$BUILD_LANDING_RESULT" \
            "$BUILD_INVESTOR_RESULT" \
            "$BUILD_ISSUER_RESULT" \
            "$BUILD_ADMIN_RESULT" \
            "$MIGRATION_RESULT" \
            "$DEPLOY_API_RESULT" \
            "$DEPLOY_LANDING_RESULT" \
            "$DEPLOY_INVESTOR_RESULT" \
            "$DEPLOY_ISSUER_RESULT" \
            "$DEPLOY_ADMIN_RESULT"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "Deployment failed"
              exit 1
            fi
          done

          if [ "${API:-false}" != "true" ] &&
             [ "${LANDING:-false}" != "true" ] &&
             [ "${INVESTOR:-false}" != "true" ] &&
             [ "${ISSUER:-false}" != "true" ] &&
             [ "${ADMIN:-false}" != "true" ] &&
             [ "${MIGRATIONS:-false}" != "true" ]; then
            echo "No deployment targets were selected"
          fi
