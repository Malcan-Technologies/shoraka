name: Deploy Services to ECS

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/landing/**"
      - "apps/investor/**"
      - "apps/issuer/**"
      - "apps/admin/**"
      - "packages/**"
      - "docs/help/**"
      - "docker/**"
      - "infra/ecs-task-definition-*.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "turbo.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Deployment scope"
        required: true
        type: choice
        default: full
        options:
          - changed
          - full
          - api
          - portals
          - landing
          - investor
          - issuer
          - admin
          - migrations-only
      skip_migrations:
        description: "Skip migrations even when Prisma migration files changed"
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: ap-southeast-5
  ECS_CLUSTER: default
  API_SERVICE: api-cashsouk-09ff

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.select.outputs.api }}
      migrations: ${{ steps.select.outputs.migrations }}
      landing: ${{ steps.select.outputs.landing }}
      investor: ${{ steps.select.outputs.investor }}
      issuer: ${{ steps.select.outputs.issuer }}
      admin: ${{ steps.select.outputs.admin }}
      action: ${{ steps.select.outputs.action }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select deployment targets
        id: select
        env:
          ACTION: ${{ inputs.action || 'changed' }}
          SKIP_MIGRATIONS: ${{ inputs.skip_migrations || false }}
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "push" ] && [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$BEFORE_SHA"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            BASE_SHA="$(git rev-parse HEAD^)"
          else
            BASE_SHA="$(git hash-object -t tree /dev/null)"
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" HEAD)"

          api_changed=false
          migrations_changed=false
          landing_changed=false
          investor_changed=false
          issuer_changed=false
          admin_changed=false

          while IFS= read -r file; do
            case "$file" in
              package.json|pnpm-lock.yaml|pnpm-workspace.yaml|tsconfig.json|turbo.json)
                api_changed=true
                landing_changed=true
                investor_changed=true
                issuer_changed=true
                admin_changed=true
                ;;
            esac

            case "$file" in
              apps/api/*|packages/types/*|packages/config/*|docker/api.Dockerfile|infra/ecs-task-definition-api.json)
                api_changed=true
                ;;
            esac

            case "$file" in
              apps/api/prisma/schema.prisma|apps/api/prisma/migrations/*)
                migrations_changed=true
                api_changed=true
                ;;
            esac

            case "$file" in
              docker/migrate.Dockerfile|docker/migrate.sh|infra/ecs-task-definition-migrate.json)
                migrations_changed=true
                ;;
            esac

            case "$file" in
              apps/landing/*|packages/*|docker/landing.Dockerfile|infra/ecs-task-definition-landing.json)
                landing_changed=true
                ;;
            esac

            case "$file" in
              apps/investor/*|packages/*|docs/help/*|docker/portal-investor.Dockerfile|infra/ecs-task-definition-investor.json)
                investor_changed=true
                ;;
            esac

            case "$file" in
              apps/issuer/*|packages/*|docs/help/*|docker/portal-issuer.Dockerfile|infra/ecs-task-definition-issuer.json)
                issuer_changed=true
                ;;
            esac

            case "$file" in
              apps/admin/*|packages/*|docs/help/*|docker/portal-admin.Dockerfile|infra/ecs-task-definition-admin.json)
                admin_changed=true
                ;;
            esac
          done <<< "$CHANGED_FILES"

          api=false
          landing=false
          investor=false
          issuer=false
          admin=false

          case "$ACTION" in
            full)
              api=true
              landing=true
              investor=true
              issuer=true
              admin=true
              ;;
            api)
              api=true
              ;;
            portals)
              landing=true
              investor=true
              issuer=true
              admin=true
              ;;
            landing)
              landing=true
              ;;
            investor)
              investor=true
              ;;
            issuer)
              issuer=true
              ;;
            admin)
              admin=true
              ;;
            migrations-only)
              ;;
            changed|*)
              api="$api_changed"
              landing="$landing_changed"
              investor="$investor_changed"
              issuer="$issuer_changed"
              admin="$admin_changed"
              ;;
          esac

          migrations=false
          if [ "$ACTION" = "migrations-only" ]; then
            migrations=true
          elif [ "$SKIP_MIGRATIONS" != "true" ] && [ "$migrations_changed" = "true" ]; then
            migrations=true
          fi

          {
            echo "action=$ACTION"
            echo "api=$api"
            echo "migrations=$migrations"
            echo "landing=$landing"
            echo "investor=$investor"
            echo "issuer=$issuer"
            echo "admin=$admin"
          } >> "$GITHUB_OUTPUT"

          echo "Action: $ACTION"
          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo ""
          echo "Selected services:"
          echo "  API: $api"
          echo "  Landing: $landing"
          echo "  Investor: $investor"
          echo "  Issuer: $issuer"
          echo "  Admin: $admin"
          echo "  Migrations: $migrations"

  build-api:
    name: Build API
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs['detect-changes'].outputs.api == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check ECS status before build
        env:
          SERVICE: api-cashsouk-09ff
        run: |
          set -euo pipefail

          CLUSTER_STATUS="$(aws ecs describe-clusters --clusters "$ECS_CLUSTER" --region "$AWS_REGION" --query 'clusters[0].status' --output text)"
          if [ "$CLUSTER_STATUS" != "ACTIVE" ]; then
            echo "ECS cluster $ECS_CLUSTER is not ACTIVE: $CLUSTER_STATUS"
            exit 1
          fi

          SERVICE_JSON="$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$SERVICE" --region "$AWS_REGION" --output json)"
          SERVICE_STATUS="$(echo "$SERVICE_JSON" | jq -r '.services[0].status // "MISSING"')"
          DEPLOYMENT_COUNT="$(echo "$SERVICE_JSON" | jq -r '.services[0].deployments | length')"
          PRIMARY_ROLLOUT="$(echo "$SERVICE_JSON" | jq -r '.services[0].deployments[]? | select(.status == "PRIMARY") | .rolloutState // "UNKNOWN"')"

          echo "Service: $SERVICE | Status: $SERVICE_STATUS | Deployments: $DEPLOYMENT_COUNT | Primary rollout: $PRIMARY_ROLLOUT"

          if [ "$SERVICE_STATUS" != "ACTIVE" ] || [ "$PRIMARY_ROLLOUT" = "FAILED" ] || [ "$DEPLOYMENT_COUNT" -gt 1 ]; then
            echo "ECS service $SERVICE is not ready for deployment"
            exit 1
          fi

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: api-cashsouk
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          max_attempts=3
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Build attempt $attempt of $max_attempts"
            if docker build -f docker/api.Dockerfile -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .; then
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Build failed after $max_attempts attempts"
              exit 1
            fi

            attempt=$((attempt + 1))
            sleep 60
          done

          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

