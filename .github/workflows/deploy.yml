name: Deploy Services to ECS

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/landing/**"
      - "apps/investor/**"
      - "apps/issuer/**"
      - "apps/admin/**"
      - "packages/**"
      - "docs/help/**"
      - "docker/**"
      - "infra/ecs-task-definition-*.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "turbo.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Deployment scope"
        required: true
        type: choice
        default: full
        options:
          - changed
          - full
          - api
          - portals
          - landing
          - investor
          - issuer
          - admin
          - migrations-only
      skip_migrations:
        description: "Skip migrations even when Prisma migration files changed"
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: ap-southeast-5
  ECS_CLUSTER: default
  API_SERVICE: api-cashsouk-09ff

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.select.outputs.api }}
      migrations: ${{ steps.select.outputs.migrations }}
      landing: ${{ steps.select.outputs.landing }}
      investor: ${{ steps.select.outputs.investor }}
      issuer: ${{ steps.select.outputs.issuer }}
      admin: ${{ steps.select.outputs.admin }}
      any_service: ${{ steps.select.outputs.any_service }}
      action: ${{ steps.select.outputs.action }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select deployment targets
        id: select
        env:
          ACTION: ${{ inputs.action || 'changed' }}
          SKIP_MIGRATIONS: ${{ inputs.skip_migrations || false }}
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "push" ] && [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$BEFORE_SHA"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            BASE_SHA="$(git rev-parse HEAD^)"
          else
            BASE_SHA="$(git hash-object -t tree /dev/null)"
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" HEAD)"

          api_changed=false
          migrations_changed=false
          landing_changed=false
          investor_changed=false
          issuer_changed=false
          admin_changed=false

          while IFS= read -r file; do
            case "$file" in
              package.json|pnpm-lock.yaml|pnpm-workspace.yaml|tsconfig.json|turbo.json)
                api_changed=true
                landing_changed=true
                investor_changed=true
                issuer_changed=true
                admin_changed=true
                ;;
            esac

            case "$file" in
              apps/api/*|packages/types/*|packages/config/*|docker/api.Dockerfile|infra/ecs-task-definition-api.json)
                api_changed=true
                ;;
            esac

            case "$file" in
              apps/api/prisma/schema.prisma|apps/api/prisma/migrations/*)
                migrations_changed=true
                api_changed=true
                ;;
            esac

            case "$file" in
              docker/migrate.Dockerfile|docker/migrate.sh|infra/ecs-task-definition-migrate.json)
                migrations_changed=true
                ;;
            esac

            case "$file" in
              apps/landing/*|packages/*|docker/landing.Dockerfile|infra/ecs-task-definition-landing.json)
                landing_changed=true
                ;;
            esac

            case "$file" in
              apps/investor/*|packages/*|docs/help/*|docker/portal-investor.Dockerfile|infra/ecs-task-definition-investor.json)
                investor_changed=true
                ;;
            esac

            case "$file" in
              apps/issuer/*|packages/*|docs/help/*|docker/portal-issuer.Dockerfile|infra/ecs-task-definition-issuer.json)
                issuer_changed=true
                ;;
            esac

            case "$file" in
              apps/admin/*|packages/*|docs/help/*|docker/portal-admin.Dockerfile|infra/ecs-task-definition-admin.json)
                admin_changed=true
                ;;
            esac
          done <<< "$CHANGED_FILES"

          api=false
          landing=false
          investor=false
          issuer=false
          admin=false

          case "$ACTION" in
            full)
              api=true
              landing=true
              investor=true
              issuer=true
              admin=true
              ;;
            api)
              api=true
              ;;
            portals)
              landing=true
              investor=true
              issuer=true
              admin=true
              ;;
            landing)
              landing=true
              ;;
            investor)
              investor=true
              ;;
            issuer)
              issuer=true
              ;;
            admin)
              admin=true
              ;;
            migrations-only)
              ;;
            changed|*)
              api="$api_changed"
              landing="$landing_changed"
              investor="$investor_changed"
              issuer="$issuer_changed"
              admin="$admin_changed"
              ;;
          esac

          migrations=false
          if [ "$ACTION" = "migrations-only" ]; then
            migrations=true
          elif [ "$SKIP_MIGRATIONS" != "true" ] && [ "$migrations_changed" = "true" ]; then
            migrations=true
          fi

          any_service=false
          if [ "$api" = "true" ] || [ "$landing" = "true" ] || [ "$investor" = "true" ] || [ "$issuer" = "true" ] || [ "$admin" = "true" ]; then
            any_service=true
          fi

          {
            echo "action=$ACTION"
            echo "api=$api"
            echo "migrations=$migrations"
            echo "landing=$landing"
            echo "investor=$investor"
            echo "issuer=$issuer"
            echo "admin=$admin"
            echo "any_service=$any_service"
          } >> "$GITHUB_OUTPUT"

          echo "Action: $ACTION"
          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo ""
          echo "Selected services:"
          echo "  API: $api"
          echo "  Landing: $landing"
          echo "  Investor: $investor"
          echo "  Issuer: $issuer"
          echo "  Admin: $admin"
          echo "  Migrations: $migrations"

  build-services:
    name: Build ${{ matrix.label }}
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.any_service == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: api
            label: API
            repository: api-cashsouk
            dockerfile: docker/api.Dockerfile
            service: api-cashsouk-09ff
          - key: landing
            label: Landing
            repository: landing-cashsouk
            dockerfile: docker/landing.Dockerfile
            service: landing-cashsouk-1156
          - key: investor
            label: Investor
            repository: investor-cashsouk
            dockerfile: docker/portal-investor.Dockerfile
            service: investor-cashsouk-50e5
          - key: issuer
            label: Issuer
            repository: issuer-cashsouk
            dockerfile: docker/portal-issuer.Dockerfile
            service: issuer-cashsouk-ff47
          - key: admin
            label: Admin
            repository: admin-cashsouk
            dockerfile: docker/portal-admin.Dockerfile
            service: admin-cashsouk-544e
    steps:
      - name: Determine if service is selected
        id: selected
        env:
          API: ${{ needs.detect-changes.outputs.api }}
          LANDING: ${{ needs.detect-changes.outputs.landing }}
          INVESTOR: ${{ needs.detect-changes.outputs.investor }}
          ISSUER: ${{ needs.detect-changes.outputs.issuer }}
          ADMIN: ${{ needs.detect-changes.outputs.admin }}
          SERVICE_KEY: ${{ matrix.key }}
        run: |
          set -euo pipefail
          case "$SERVICE_KEY" in
            api) selected="$API" ;;
            landing) selected="$LANDING" ;;
            investor) selected="$INVESTOR" ;;
            issuer) selected="$ISSUER" ;;
            admin) selected="$ADMIN" ;;
            *) selected=false ;;
          esac
          echo "selected=$selected" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        if: steps.selected.outputs.selected == 'true'
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        if: steps.selected.outputs.selected == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.selected.outputs.selected == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check ECS status before build
        if: steps.selected.outputs.selected == 'true'
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail

          CLUSTER_STATUS="$(aws ecs describe-clusters \
            --clusters "$ECS_CLUSTER" \
            --region "$AWS_REGION" \
            --query 'clusters[0].status' \
            --output text)"

          if [ "$CLUSTER_STATUS" != "ACTIVE" ]; then
            echo "ECS cluster $ECS_CLUSTER is not ACTIVE: $CLUSTER_STATUS"
            exit 1
          fi

          SERVICE_JSON="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$SERVICE" \
            --region "$AWS_REGION" \
            --output json)"

          SERVICE_STATUS="$(echo "$SERVICE_JSON" | jq -r '.services[0].status // "MISSING"')"
          DESIRED_COUNT="$(echo "$SERVICE_JSON" | jq -r '.services[0].desiredCount // 0')"
          RUNNING_COUNT="$(echo "$SERVICE_JSON" | jq -r '.services[0].runningCount // 0')"
          PENDING_COUNT="$(echo "$SERVICE_JSON" | jq -r '.services[0].pendingCount // 0')"
          DEPLOYMENT_COUNT="$(echo "$SERVICE_JSON" | jq -r '.services[0].deployments | length')"
          PRIMARY_ROLLOUT="$(echo "$SERVICE_JSON" | jq -r '.services[0].deployments[]? | select(.status == "PRIMARY") | .rolloutState // "UNKNOWN"')"

          echo "Service: $SERVICE"
          echo "Status: $SERVICE_STATUS"
          echo "Desired: $DESIRED_COUNT | Running: $RUNNING_COUNT | Pending: $PENDING_COUNT"
          echo "Deployments: $DEPLOYMENT_COUNT | Primary rollout: $PRIMARY_ROLLOUT"

          if [ "$SERVICE_STATUS" != "ACTIVE" ]; then
            echo "ECS service $SERVICE is not ACTIVE"
            exit 1
          fi

          if [ "$PRIMARY_ROLLOUT" = "FAILED" ]; then
            echo "ECS service $SERVICE has a failed primary rollout"
            exit 1
          fi

          if [ "$DEPLOYMENT_COUNT" -gt 1 ]; then
            echo "ECS service $SERVICE already has a deployment in progress"
            exit 1
          fi

      - name: Build and push image
        if: steps.selected.outputs.selected == 'true'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.repository }}
          DOCKERFILE: ${{ matrix.dockerfile }}
          IMAGE_TAG: ${{ github.sha }}
          SERVICE_KEY: ${{ matrix.key }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_COGNITO_REGION: ${{ secrets.NEXT_PUBLIC_COGNITO_REGION }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          set -euo pipefail

          echo "Building $ECR_REPOSITORY:$IMAGE_TAG"
          BUILD_ARGS=()

          if [ "$SERVICE_KEY" != "api" ]; then
            BUILD_ARGS=(
              --build-arg "NEXT_PUBLIC_COGNITO_USER_POOL_ID=$NEXT_PUBLIC_COGNITO_USER_POOL_ID"
              --build-arg "NEXT_PUBLIC_COGNITO_CLIENT_ID=$NEXT_PUBLIC_COGNITO_CLIENT_ID"
              --build-arg "NEXT_PUBLIC_COGNITO_DOMAIN=auth.cashsouk.com"
              --build-arg "NEXT_PUBLIC_COGNITO_REGION=$NEXT_PUBLIC_COGNITO_REGION"
              --build-arg "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL"
              --build-arg "NEXT_PUBLIC_INVESTOR_URL=https://investor.cashsouk.com"
              --build-arg "NEXT_PUBLIC_ISSUER_URL=https://issuer.cashsouk.com"
              --build-arg "NEXT_PUBLIC_ADMIN_URL=https://admin.cashsouk.com"
              --build-arg "NEXT_PUBLIC_LANDING_URL=https://cashsouk.com"
              --build-arg "NEXT_PUBLIC_COOKIE_DOMAIN=.cashsouk.com"
            )
          fi

          max_attempts=3
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Build attempt $attempt of $max_attempts"
            if docker build -f "$DOCKERFILE" "${BUILD_ARGS[@]}" -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .; then
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Build failed after $max_attempts attempts"
              exit 1
            fi

            attempt=$((attempt + 1))
            sleep 60
          done

          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

  db-migrations:
    name: Conditional Database Migrations
    needs: [detect-changes, build-services]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.detect-changes.outputs.migrations == 'true' &&
      (needs.build-services.result == 'success' || needs.build-services.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push migration image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: cashsouk-migrate
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          docker build -f docker/migrate.Dockerfile -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Run database migrations
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          aws logs create-log-group \
            --log-group-name /ecs/cashsouk-migrate \
            --region "$AWS_REGION" 2>/dev/null || true

          TASK_DEF="$(jq --arg IMAGE "$ECR_REGISTRY/cashsouk-migrate:$IMAGE_TAG" \
            '.containerDefinitions[0].image = $IMAGE' \
            infra/ecs-task-definition-migrate.json)"

          TASK_DEF_ARN="$(aws ecs register-task-definition \
            --cli-input-json "$TASK_DEF" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          SUBNETS="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$API_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.subnets' \
            --output text | tr '\t' ',')"

          SECURITY_GROUPS="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$API_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups' \
            --output text | tr '\t' ',')"

          ASSIGN_PUBLIC_IP="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$API_SERVICE" \
            --region "$AWS_REGION" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.assignPublicIp' \
            --output text)"

          if [ -z "$ASSIGN_PUBLIC_IP" ] || [ "$ASSIGN_PUBLIC_IP" = "None" ]; then
            ASSIGN_PUBLIC_IP="DISABLED"
          fi

          RUN_TASK_JSON="$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --launch-type FARGATE \
            --task-definition "$TASK_DEF_ARN" \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SECURITY_GROUPS],assignPublicIp=$ASSIGN_PUBLIC_IP}" \
            --region "$AWS_REGION" \
            --output json)"

          FAILURE_REASON="$(echo "$RUN_TASK_JSON" | jq -r '.failures[0].reason // empty')"
          TASK_ARN="$(echo "$RUN_TASK_JSON" | jq -r '.tasks[0].taskArn // empty')"

          if [ -n "$FAILURE_REASON" ] || [ -z "$TASK_ARN" ]; then
            echo "Failed to start migration task"
            echo "$RUN_TASK_JSON"
            exit 1
          fi

          echo "Waiting for migrations to complete: $TASK_ARN"

          aws ecs wait tasks-stopped \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --region "$AWS_REGION"

          EXIT_CODE="$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --region "$AWS_REGION" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migrations failed with exit code $EXIT_CODE"
            aws ecs describe-tasks \
              --cluster "$ECS_CLUSTER" \
              --tasks "$TASK_ARN" \
              --region "$AWS_REGION" \
              --query 'tasks[0]' || true
            aws logs tail /ecs/cashsouk-migrate \
              --since 15m \
              --format short \
              --region "$AWS_REGION" || true
            exit 1
          fi

          echo "Migrations completed successfully"

  deploy-services:
    name: Deploy ${{ matrix.label }}
    needs: [detect-changes, build-services, db-migrations]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.detect-changes.outputs.any_service == 'true' &&
      needs.build-services.result == 'success' &&
      (needs.db-migrations.result == 'success' || needs.db-migrations.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: api
            label: API
            repository: api-cashsouk
            service: api-cashsouk-09ff
            task_definition: infra/ecs-task-definition-api.json
            task_family: default-api-cashsouk-09ff
            log_group: /ecs/cashsouk-api
          - key: landing
            label: Landing
            repository: landing-cashsouk
            service: landing-cashsouk-1156
            task_definition: infra/ecs-task-definition-landing.json
            task_family: default-landing-cashsouk-1156
            log_group: /ecs/cashsouk-landing
          - key: investor
            label: Investor
            repository: investor-cashsouk
            service: investor-cashsouk-50e5
            task_definition: infra/ecs-task-definition-investor.json
            task_family: default-investor-cashsouk-50e5
            log_group: /ecs/cashsouk-investor
          - key: issuer
            label: Issuer
            repository: issuer-cashsouk
            service: issuer-cashsouk-ff47
            task_definition: infra/ecs-task-definition-issuer.json
            task_family: default-issuer-cashsouk-ff47
            log_group: /ecs/cashsouk-issuer
          - key: admin
            label: Admin
            repository: admin-cashsouk
            service: admin-cashsouk-544e
            task_definition: infra/ecs-task-definition-admin.json
            task_family: default-admin-cashsouk-544e
            log_group: /ecs/cashsouk-admin
    steps:
      - name: Determine if service is selected
        id: selected
        env:
          API: ${{ needs.detect-changes.outputs.api }}
          LANDING: ${{ needs.detect-changes.outputs.landing }}
          INVESTOR: ${{ needs.detect-changes.outputs.investor }}
          ISSUER: ${{ needs.detect-changes.outputs.issuer }}
          ADMIN: ${{ needs.detect-changes.outputs.admin }}
          SERVICE_KEY: ${{ matrix.key }}
        run: |
          set -euo pipefail
          case "$SERVICE_KEY" in
            api) selected="$API" ;;
            landing) selected="$LANDING" ;;
            investor) selected="$INVESTOR" ;;
            issuer) selected="$ISSUER" ;;
            admin) selected="$ADMIN" ;;
            *) selected=false ;;
          esac
          echo "selected=$selected" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        if: steps.selected.outputs.selected == 'true'
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        if: steps.selected.outputs.selected == 'true'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.selected.outputs.selected == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Register task definition and deploy
        if: steps.selected.outputs.selected == 'true'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.repository }}
          IMAGE_TAG: ${{ github.sha }}
          SERVICE: ${{ matrix.service }}
          TASK_DEFINITION: ${{ matrix.task_definition }}
          TASK_FAMILY: ${{ matrix.task_family }}
          LOG_GROUP: ${{ matrix.log_group }}
        run: |
          set -euo pipefail

          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          aws logs create-log-group \
            --log-group-name "$LOG_GROUP" \
            --region "$AWS_REGION" 2>/dev/null || true

          TASK_DEF="$(jq \
            --arg IMAGE "$IMAGE" \
            --arg FAMILY "$TASK_FAMILY" \
            '.family = $FAMILY | .containerDefinitions[0].image = $IMAGE' \
            "$TASK_DEFINITION")"

          TASK_DEF_ARN="$(aws ecs register-task-definition \
            --cli-input-json "$TASK_DEF" \
            --region "$AWS_REGION" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          echo "Registered $TASK_DEF_ARN"

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$TASK_DEF_ARN" \
            --force-new-deployment \
            --region "$AWS_REGION" > /dev/null

          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$SERVICE" \
            --region "$AWS_REGION"

          SERVICE_JSON="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$SERVICE" \
            --region "$AWS_REGION" \
            --output json)"

          RUNNING_TASK_DEF="$(echo "$SERVICE_JSON" | jq -r '.services[0].deployments[] | select(.status == "PRIMARY") | .taskDefinition')"
          ROLLOUT_STATE="$(echo "$SERVICE_JSON" | jq -r '.services[0].deployments[] | select(.status == "PRIMARY") | .rolloutState // "UNKNOWN"')"
          RUNNING_COUNT="$(echo "$SERVICE_JSON" | jq -r '.services[0].runningCount')"
          DESIRED_COUNT="$(echo "$SERVICE_JSON" | jq -r '.services[0].desiredCount')"

          echo "Primary task definition: $RUNNING_TASK_DEF"
          echo "Rollout state: $ROLLOUT_STATE"
          echo "Running: $RUNNING_COUNT | Desired: $DESIRED_COUNT"

          if [ "$RUNNING_TASK_DEF" != "$TASK_DEF_ARN" ]; then
            echo "$SERVICE did not promote the expected task definition"
            echo "Expected: $TASK_DEF_ARN"
            echo "Running:  $RUNNING_TASK_DEF"
            exit 1
          fi

          if [ "$ROLLOUT_STATE" = "FAILED" ]; then
            echo "$SERVICE rollout failed"
            exit 1
          fi

          if [ "$RUNNING_COUNT" -lt "$DESIRED_COUNT" ]; then
            echo "$SERVICE is stable but has fewer running tasks than desired"
            exit 1
          fi

  summary:
    name: Deployment Summary
    needs: [detect-changes, build-services, db-migrations, deploy-services]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment summary
        env:
          DETECT_RESULT: ${{ needs.detect-changes.result }}
          ACTION: ${{ needs.detect-changes.outputs.action }}
          API: ${{ needs.detect-changes.outputs.api }}
          LANDING: ${{ needs.detect-changes.outputs.landing }}
          INVESTOR: ${{ needs.detect-changes.outputs.investor }}
          ISSUER: ${{ needs.detect-changes.outputs.issuer }}
          ADMIN: ${{ needs.detect-changes.outputs.admin }}
          MIGRATIONS: ${{ needs.detect-changes.outputs.migrations }}
          BUILD_RESULT: ${{ needs.build-services.result }}
          MIGRATION_RESULT: ${{ needs.db-migrations.result }}
          DEPLOY_RESULT: ${{ needs.deploy-services.result }}
        run: |
          set -euo pipefail

          echo "Deployment summary"
          echo "Image tag: ${{ github.sha }}"
          echo "Action: ${ACTION:-n/a}"
          echo ""
          echo "Service   | Selected"
          echo "----------|---------"
          echo "API       | ${API:-false}"
          echo "Landing   | ${LANDING:-false}"
          echo "Investor  | ${INVESTOR:-false}"
          echo "Issuer    | ${ISSUER:-false}"
          echo "Admin     | ${ADMIN:-false}"
          echo "Migrations| ${MIGRATIONS:-false}"
          echo ""
          echo "Detect result: $DETECT_RESULT"
          echo "Build result: $BUILD_RESULT"
          echo "Migration result: $MIGRATION_RESULT"
          echo "Deploy result: $DEPLOY_RESULT"

          for result in "$DETECT_RESULT" "$BUILD_RESULT" "$MIGRATION_RESULT" "$DEPLOY_RESULT"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "Deployment failed"
              exit 1
            fi
          done

          if [ "${API:-false}" != "true" ] &&
             [ "${LANDING:-false}" != "true" ] &&
             [ "${INVESTOR:-false}" != "true" ] &&
             [ "${ISSUER:-false}" != "true" ] &&
             [ "${ADMIN:-false}" != "true" ] &&
             [ "${MIGRATIONS:-false}" != "true" ]; then
            echo "No deployment targets were selected"
          fi
