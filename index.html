<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Supporting Documents</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f6f8;
}

.modal {
  width: 900px;
  margin: 40px auto;
  background: white;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
}

.header {
  padding: 16px 20px;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  justify-content: space-between;
}

.title {
  font-size: 18px;
  font-weight: bold;
}

.content {
  padding: 20px;
}

.step {
  border: 1px solid #e5e7eb;
  border-radius: 8px;
}

.step-header {
  padding: 12px 16px;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

.category {
  padding: 16px;
  border-bottom: 1px solid #f0f0f0;
}

.category:last-child {
  border-bottom: none;
}

.category-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.doc {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 8px;
}

.doc input {
  flex: 2;
  padding: 8px;
  border: 1px solid #ddd;
  border-radius: 6px;
}

.upload-btn {
  padding: 8px 12px;
  border: 1px solid #ddd;
  background: #fff;
  border-radius: 6px;
  cursor: pointer;
}

.inline {
  display: flex;
  gap: 6px;
  align-items: center;
}

.small {
  width: 50px;
  padding: 6px;
}

.toggle {
  display: flex;
  border: 1px solid #ddd;
  border-radius: 6px;
  overflow: hidden;
}

.toggle div {
  padding: 6px 10px;
  cursor: pointer;
}

.toggle .active {
  background: #8A0304;
  color: white;
}

.chip {
  padding: 5px 10px;
  border: 1px solid #ddd;
  border-radius: 20px;
  cursor: pointer;
}

.chip.active {
  background: #8A0304;
  color: white;
  border-color: #8A0304;
}

.delete {
  cursor: pointer;
  color: #999;
}

.footer {
  padding: 16px;
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  border-top: 1px solid #eee;
}

button.primary {
  background: #8A0304;
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 6px;
}

button.secondary {
  background: white;
  border: 1px solid #ddd;
  padding: 10px 16px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="modal">
  <div class="header">
    <div class="title">Create product</div>
    ✕
  </div>

  <div class="content">

    <div class="step">
      <div class="step-header">
        Supporting Documents
        <button class="secondary">Add category</button>
      </div>

      <div class="category">
        <div class="category-header">
          <b>Financial Docs</b>
          <button class="secondary">Add document</button>
        </div>

        <div class="doc">
          <input value="Latest Management Account" />

          <button class="upload-btn">Template</button>

          <div class="inline">
            <div class="toggle">
              <div>Single</div>
              <div class="active">Multi</div>
            </div>

            <input class="small" value="5" />

            <div class="chip active">PDF</div>
            <div class="chip">Excel</div>
          </div>

          <div class="delete">🗑</div>
        </div>

        <div class="doc">
          <input value="Details of Existing Borrowings" />

          <button class="upload-btn">Template</button>

          <div class="inline">
            <div class="toggle">
              <div class="active">Single</div>
              <div>Multi</div>
            </div>

            <div class="chip active">PDF</div>
            <div class="chip">Excel</div>
          </div>

          <div class="delete">🗑</div>
        </div>

      </div>

      <div class="category">
        <div class="category-header">
          <b>Legal Docs</b>
          <button class="secondary">Add document</button>
        </div>

        <div class="doc">
          <input value="Deed of Assignment" />

          <button class="upload-btn">Template</button>

          <div class="inline">
            <div class="toggle">
              <div class="active">Single</div>
              <div>Multi</div>
            </div>

            <div class="chip active">PDF</div>
            <div class="chip">Excel</div>
          </div>

          <div class="delete">🗑</div>
        </div>

      </div>

    </div>

  </div>

  <div class="footer">
    <button class="secondary">Cancel</button>
    <button class="primary">Create</button>
  </div>
</div>

</body>
</html>
