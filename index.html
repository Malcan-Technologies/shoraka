<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Financial Statements</title>
<style>

body{
  font-family: Inter, Arial, sans-serif;
  background:#f7f7f7;
  margin:0;
}

.container{
  max-width:900px;
  margin:40px auto;
  background:white;
  padding:40px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

h1{
  margin-bottom:4px;
}

.subtitle{
  color:#777;
  margin-bottom:30px;
}

.section{
  margin-top:32px;
}

.section h3{
  margin-bottom:16px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px 30px;
}

.field{
  display:flex;
  flex-direction:column;
}

label{
  font-size:14px;
  margin-bottom:6px;
}

.input{
  position:relative;
}

input{
  width:100%;
  padding:10px 12px;
  border:1px solid #ddd;
  border-radius:6px;
  font-size:14px;
}

.currency input{
  padding-left:32px;
}

.currency::before{
  content:"RM";
  position:absolute;
  left:10px;
  top:10px;
  color:#888;
  font-size:13px;
}

.readonly input{
  background:#f2f2f2;
}

.buttons{
  margin-top:40px;
  display:flex;
  justify-content:space-between;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
}

.back{
  background:#eee;
}

.save{
  background:#8A0304;
  color:white;
}

</style>
</head>
<body>

<div class="container">

<h1>Financial Statements</h1>
<p class="subtitle">Tell us about your company's financial performance</p>

<!-- Financial Year -->
<div class="section">
<h3>Financial Year</h3>

<div class="grid">

<div class="field">
<label>Financing Year End</label>
<input type="date">
</div>

<div class="field">
<label>Balance Sheet Financial Year</label>
<input type="date">
</div>

</div>
</div>


<!-- Assets -->
<div class="section">
<h3>Assets</h3>

<div class="grid">

<div class="field currency input">
<label>Fixed Assets</label>
<input type="number">
</div>

<div class="field currency input">
<label>Other Assets</label>
<input type="number">
</div>

<div class="field currency input">
<label>Current Assets</label>
<input type="number">
</div>

<div class="field currency input">
<label>Non Current Assets</label>
<input type="number">
</div>

<div class="field currency input readonly">
<label>Total Assets</label>
<input type="number" readonly>
</div>

</div>
</div>


<!-- Liabilities -->
<div class="section">
<h3>Liabilities</h3>

<div class="grid">

<div class="field currency input">
<label>Current Liability</label>
<input type="number">
</div>

<div class="field currency input">
<label>Long Term Liability</label>
<input type="number">
</div>

<div class="field currency input">
<label>Non Current Liability</label>
<input type="number">
</div>

<div class="field currency input readonly">
<label>Total Liability</label>
<input type="number" readonly>
</div>

</div>
</div>


<!-- Equity -->
<div class="section">
<h3>Equity</h3>

<div class="grid">

<div class="field currency input">
<label>Paid Up</label>
<input type="number">
</div>

</div>
</div>


<!-- Profit -->
<div class="section">
<h3>Profit & Loss</h3>

<div class="grid">

<div class="field currency input">
<label>Turnover</label>
<input type="number">
</div>

<div class="field currency input">
<label>Profit Before Tax</label>
<input type="number">
</div>

<div class="field currency input">
<label>Profit After Tax</label>
<input type="number">
</div>

<div class="field currency input">
<label>Minority Interest</label>
<input type="number">
</div>

<div class="field currency input">
<label>Net Dividend</label>
<input type="number">
</div>

<div class="field currency input">
<label>Profit & Loss Of The Year</label>
<input type="number">
</div>

</div>
</div>


<!-- Ratios -->
<div class="section">
<h3>Financial Ratios</h3>

<div class="grid">

<div class="field readonly">
<label>Turnover Growth</label>
<input readonly>
</div>

<div class="field readonly">
<label>Profit Margin</label>
<input readonly>
</div>

<div class="field readonly">
<label>Return Of Equity</label>
<input readonly>
</div>

<div class="field readonly">
<label>Current Ratio</label>
<input readonly>
</div>

<div class="field readonly">
<label>Working Capital</label>
<input readonly>
</div>

</div>
</div>


<div class="buttons">
<button class="back">Back</button>
<button class="save">Save and continue</button>
</div>

</div>

</body>
</html>
